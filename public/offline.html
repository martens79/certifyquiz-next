<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline | CertifyQuiz</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      max-width: 520px;
      padding: 32px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }

    h1 {
      margin-top: 0;
    }

    p {
      color: #475569;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 16px;
      background: #0f172a;
      color: white;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>📡 You're offline</h1>

    <p>
      CertifyQuiz cannot be reached right now.
    </p>

    <p>
      Check your Internet connection and try again.
    </p>

    <p>
      Previously visited pages may still be available.
    </p>

    <a href="/">
      Try Again
    </a>
  </div>
</body>
</html>
